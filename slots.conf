server {
    listen 443 ssl;
    server_name slotsidback.fun www.slotsidback.fun;

    ssl_certificate /etc/letsencrypt/live/slotsidback.fun/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/slotsidback.fun/privkey.pem;

    root /var/www/html;
    index index.html;

    # Crypto Pay (@CryptoBot) → shark_slots проверяет подпись → forward на main
    # URL в Crypto Pay UI: https://slotsidback.fun/api/crypto-bot/y825xaasdtq9ds4zacsfodra6me7qg
    location ~ ^/api/crypto-bot/.*$ {
        proxy_pass http://127.0.0.1:4001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header crypto-pay-api-signature $http_crypto_pay_api_signature;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
        client_max_body_size 1m;
        # Тело не переписывать — HMAC по raw JSON на shark_slots
        proxy_request_buffering on;
    }

    location /api {
        proxy_pass http://127.0.0.1:4001;  # Прокси на NestJS (бэкенд)
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ /\.ht {
        deny all;
    }

    location ~ ^/mobule/.*$ {
	   proxy_pass http://127.0.0.1:4001;
       proxy_set_header Host $host;
       proxy_set_header X-Real-IP $remote_addr;
       proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
       proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/grkdlchh8am0pfeuitmkmbdvtnbmnj/(.*)$ {
        proxy_pass http://127.0.0.1:8081;  # Прокси на adminer
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name slotsidback.fun www.slotsidback.fun;
    return 301 https://$host$request_uri;
}