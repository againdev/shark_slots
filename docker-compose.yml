# Stack 1/2 — PostgreSQL, Redis, Adminer, Backups, Nginx
# Запуск: docker compose up -d

networks:
  slots-net:
    name: slots-net

volumes:
  postgres_data:

services:
  postgres:
    image: postgres:15-alpine
    container_name: slots-postgres
    networks:
      - slots-net
    ports:
      - '5432:5432'
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgrespass}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      TZ: ${TZ:-Europe/Kyiv}
    command: ['postgres', '-c', 'timezone=${TZ:-Europe/Kyiv}']
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    mem_limit: 1g

  redis:
    image: redis:7-alpine
    container_name: slots-redis
    networks:
      - slots-net
    ports:
      - '127.0.0.1:6379:6379'
    env_file:
      - .env
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redispass}
    command:
      - sh
      - -c
      - |
        redis-server \
          --requirepass "$$REDIS_PASSWORD" \
          --appendonly yes \
          --maxmemory 512mb \
          --maxmemory-policy allkeys-lru \
          --protected-mode no \
          --timeout 300 \
          --tcp-keepalive 60
    healthcheck:
      test:
        - CMD-SHELL
        - redis-cli -a "$$REDIS_PASSWORD" ping | grep PONG
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    mem_limit: 512m

  adminer:
    image: adminer:4
    container_name: slots-adminer
    networks:
      - slots-net
    ports:
      - '127.0.0.1:8080:8080'
    restart: unless-stopped

  postgres-backup:
    image: alpine:3.20
    container_name: slots-postgres-backup
    networks:
      - slots-net
    env_file:
      - .env
    environment:
      PG_HOST: postgres
      PG_USER: ${POSTGRES_USER:-postgres}
      PG_PASSWORD: ${POSTGRES_PASSWORD:-postgrespass}
      PG_DATABASE: ${POSTGRES_DB:-postgres}
      TZ: ${TZ:-Europe/Kyiv}
      BACKUP_DIR: /backups
    volumes:
      - ./backups:/backups
      - ./backup.sh:/backup.sh:ro
    command:
      - sh
      - -c
      - |
        apk add --no-cache postgresql-client bash &&
        chmod +x /backup.sh &&
        echo "Backup scheduler: daily at 02:00 ($$TZ)" &&
        while true; do
          hour=$$(date +%H) &&
          minute=$$(date +%M) &&
          if [ "$$hour" = "02" ] && [ "$$minute" = "00" ]; then
            sh /backup.sh &&
            sleep 3600
          else
            sleep 60
          fi
        done
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: slots-nginx
    network_mode: host
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/ssl:/var/www/ssl:ro
      - ./nginx/slots.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    restart: unless-stopped
