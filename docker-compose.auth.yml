# Логин: Google / Telegram / reCAPTCHA / internal auth API
# Запуск: docker compose -f docker-compose.auth.yml --env-file .env up -d --build

networks:
  slots-net:
    external: true
    name: slots-net

services:
  auth:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: slots-auth
    networks:
      - slots-net
    ports:
      - '127.0.0.1:4001:4001'
    env_file:
      - .env
    environment:
      NODE_ENV: production
      APP_ROLE: auth
      APP_ADDRESS: 0.0.0.0
      APP_PORT: 4001
    command: ['node', 'dist/main']
    restart: unless-stopped
